services:

  # Backend
  backend:
    build:
      context: ./dev
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as r; r.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Frontend (nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1080:80"
    depends_on:
      backend:
        condition: service_healthy
