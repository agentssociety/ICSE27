services:

  # Backend
  backend:
    build:
      context: ./dev
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9001:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as r; r.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      DATABASE_URL: postgresql://app:password@db:5432/project_8
    depends_on:
      db:
        condition: service_healthy

  # Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: project_8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d project_8"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Frontend (nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1081:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
